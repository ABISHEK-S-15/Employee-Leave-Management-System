<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Leave Sync'">Leave Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:fragment="sidebar" class="sidebar" id="sidebar">
        <div class="d-flex align-items-center mb-5 px-3">
            <div class="btn-glow rounded-circle d-flex align-items-center justify-content-center me-3"
                style="width: 40px; height: 40px;">
                <i class="bi bi-calendar-check-fill m-0"></i>
            </div>
            <h4 class="m-0">Leave Sync</h4>
        </div>

        <!-- Employee Navigation -->
        <div sec:authorize="hasRole('EMPLOYEE')">
            <a th:href="@{/employee/dashboard}" class="sidebar-link"
                th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a th:href="@{/employee/leave/apply}" class="sidebar-link"
                th:classappend="${activePage == 'apply' ? 'active' : ''}">
                <i class="bi bi-plus-square-fill"></i> Apply Leave
            </a>
            <a th:href="@{/employee/leave/history}" class="sidebar-link"
                th:classappend="${activePage == 'history' ? 'active' : ''}">
                <i class="bi bi-clock-history"></i> My History
            </a>
            <a th:href="@{/employee/profile}" class="sidebar-link"
                th:classappend="${activePage == 'profile' ? 'active' : ''}">
                <i class="bi bi-person-badge-fill"></i> My Profile
            </a>
        </div>

        <!-- Manager Navigation -->
        <div sec:authorize="hasRole('MANAGER')">
            <a th:href="@{/manager/dashboard}" class="sidebar-link"
                th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/manager/employees}" class="sidebar-link"
                th:classappend="${activePage == 'employees' ? 'active' : ''}">
                <i class="bi bi-people-fill"></i> Employees
            </a>
            <a th:href="@{/manager/history}" class="sidebar-link"
                th:classappend="${activePage == 'history' ? 'active' : ''}">
                <i class="bi bi-journal-text"></i> All Requests
            </a>
            <a th:href="@{/manager/policies}" class="sidebar-link"
                th:classappend="${activePage == 'policies' ? 'active' : ''}">
                <i class="bi bi-shield-lock-fill"></i> Policies
            </a>
            <a th:href="@{/manager/profile}" class="sidebar-link"
                th:classappend="${activePage == 'profile' ? 'active' : ''}">
                <i class="bi bi-person-lines-fill"></i> Profile
            </a>
        </div>

        <div class="mt-auto pt-5">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="sidebar-link border-0 bg-transparent w-100 text-start text-danger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <nav th:fragment="topbar" class="navbar-top px-4 py-3">
        <div class="d-lg-none">
            <button class="btn btn-link text-white p-0"
                onclick="document.getElementById('sidebar').classList.toggle('show')">
                <i class="bi bi-list fs-2"></i>
            </button>
        </div>
        <div class="ms-auto d-flex align-items-center gap-4">
            <div class="d-flex flex-column text-end d-none d-sm-block">
                <span class="text-white fw-bold" th:text="${#authentication.name}">User</span>
                <small class="text-secondary text-uppercase fw-bold" style="letter-spacing: 1px;"
                    th:text="${#strings.substring(#authentication.authorities[0], 5)}">Role</small>
            </div>
            <div class="dropdown">
                <a href="#"
                    class="btn-glow rounded-circle d-flex align-items-center justify-content-center p-0 overflow-hidden"
                    style="width: 45px; height: 45px;" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle fs-3"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end glass-card border-0 shadow-lg mt-3">
                    <li><a class="dropdown-item text-white py-2"
                            th:href="@{${  #authorization.expression('hasRole(''MANAGER'')') ? '/manager/profile' : '/employee/profile'}}">
                            <i class="bi bi-person me-2"></i> Profile</a>
                    </li>
                    <li>
                        <hr class="dropdown-divider border-glass">
                    </li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item text-danger py-2"><i
                                    class="bi bi-box-arrow-right me-2"></i> Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>

            document.addEventListener('DOMContentLoaded', function () {
                // Optional: Auto-hide sidebar on mobile after clicking a link
                if (window.innerWidth < 992) {
                    const links = document.querySelectorAll('.sidebar-link');
                    links.forEach(link => {
                        link.addEventListener('click', () => {
                            document.getElementById('sidebar').classList.remove('show');
                        });
                    });
                }
            });
        </script>
    </th:block>

</body>

</html>
