<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Apply Leave')}"></head>
<body>

<div th:replace="~{fragments :: sidebar(activePage='apply')}"></div>

<main class="main-wrapper">
    <nav th:replace="~{fragments :: topbar}"></nav>

    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-xl-8 col-lg-10">
                <div class="glass-card animate-up">
                    <div class="mb-5">
                        <h2 class="mb-2">Apply for Leave</h2>
                        <p class="text-secondary">Fill in the details below to submit your leave request for approval.</p>
                    </div>
                    
                    <div th:if="${error}" class="alert glass-card border-danger text-danger mb-4" role="alert">
                        <i class="bi bi-exclamation-circle-fill me-2"></i> <span th:text="${error}"></span>
                    </div>
                    
                    <form th:action="@{/employee/leave/apply}" method="post" th:object="${leaveRequest}" enctype="multipart/form-data">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label for="type" class="form-label text-primary-glow small fw-bold text-uppercase">Leave Type</label>
                                <select class="glass-input" id="type" th:field="*{type}" required>
                                    <option value="" selected disabled>Select leave type</option>
                                    <option value="ANNUAL">Annual Leave</option>
                                    <option value="SICK">Sick Leave</option>
                                    <option value="CASUAL">Casual Leave</option>
                                    <option value="UNPAID">Unpaid Leave</option>
                                    <option value="MATERNITY_PATERNITY">Maternity/Paternity</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="startDate" class="form-label text-primary-glow small fw-bold text-uppercase">Start Date</label>
                                <input type="date" class="glass-input" id="startDate" th:field="*{startDate}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="endDate" class="form-label text-primary-glow small fw-bold text-uppercase">End Date</label>
                                <input type="date" class="glass-input" id="endDate" th:field="*{endDate}" required>
                            </div>

                            <div class="col-md-12">
                                <label for="reason" class="form-label text-primary-glow small fw-bold text-uppercase">Reason for Absence</label>
                                <textarea class="glass-input" id="reason" rows="4" th:field="*{reason}" placeholder="Provide a brief explanation for your leave..." required minlength="10"></textarea>
                            </div>

                            <div class="col-md-12">
                                <label for="document" class="form-label text-primary-glow small fw-bold text-uppercase">Supporting Document (Optional)</label>
                                <div class="file-upload-wrapper rounded">
                                    <input class="form-control bg-transparent border-0 text-white-50 custom-file-input" type="file" id="document" name="document" accept=".pdf,.jpg,.jpeg,.png">
                                    <p class="small text-secondary mt-1 mb-0" style="font-size: 0.75rem;">Allowed: PDF, JPG, PNG (Max 2MB)</p>
                                </div>
                            </div>

                            <div class="col-md-12 d-flex justify-content-end gap-3 pt-4">
                                <a th:href="@{/employee/dashboard}" class="btn btn-link text-white text-decoration-none fw-semibold">Cancel</a>
                                <button type="submit" class="btn btn-glow px-5">Submit Request</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments :: scripts}"></th:block>
<script>
    document.getElementById('startDate').addEventListener('change', function() {
        document.getElementById('endDate').min = this.value;
    });
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').min = today;
</script>
</body>
</html>
