<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Leave History')}"></head>

<body>

    <div th:replace="~{fragments :: sidebar(activePage='history')}"></div>

    <main class="main-wrapper">
        <nav th:replace="~{fragments :: topbar}"></nav>

        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-5 animate-up">
                <div>
                    <h1 class="mb-2">My Leave History</h1>
                    <p class="text-secondary m-0">Tracking your leave off through the year.</p>
                </div>
                <a th:href="@{/employee/leave/apply}" class="btn btn-glow">
                    <i class="bi bi-plus-lg me-2"></i> Apply New Leave
                </a>
            </div>

            <div th:if="${param.success}" class="alert glass-card border-success text-success mb-4 animate-up"
                role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> Your request has been submitted successfully!
            </div>

            <div class="glass-card animate-up" style="animation-delay: 0.2s;">
                <div class="premium-table-container">
                    <table class="premium-table">
                        <thead>
                            <tr>
                                <th>Date Requested</th>
                                <th>Type</th>
                                <th>Duration</th>
                                <th>Days</th>
                                <th>Status</th>
                                <th>Document</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="leave : ${history.content}">
                                <td class="text-secondary"
                                    th:text="${#temporals.format(leave.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</td>
                                <td>
                                    <span class="fw-semibold" th:text="${leave.type}">ANNUAL</span>
                                </td>
                                <td class="text-secondary"
                                    th:text="${#temporals.format(leave.startDate, 'MMM dd')} + ' - ' + ${#temporals.format(leave.endDate, 'MMM dd')}">
                                    Jan 01 - Jan 05</td>
                                <td th:text="${leave.totalDays}">5</td>
                                <td>
                                    <span class="status-pill"
                                        th:classappend="${leave.status.name() == 'PENDING' ? 'pending' : (leave.status.name() == 'APPROVED' ? 'approved' : 'rejected')}"
                                        th:text="${leave.status}">PENDING</span>
                                </td>
                                <td>
                                    <a th:if="${leave.documentPath != null}" th:href="@{${leave.documentPath}}"
                                        target="_blank" class="btn btn-link text-primary-glow p-0 fw-bold"
                                        title="View Document">
                                        <i class="bi bi-file-earmark-text me-1"></i> View
                                    </a>
                                    <span th:if="${leave.documentPath == null}" class="text-secondary">-</span>
                                </td>
                                <td class="text-end">
                                    <form th:if="${leave.status.name() == 'PENDING'}"
                                        th:action="@{/employee/leave/cancel}" method="post" class="d-inline">
                                        <input type="hidden" name="leaveId" th:value="${leave.id}">
                                        <button type="submit"
                                            class="btn btn-link text-danger p-0 text-decoration-none fw-bold small hover-glow">
                                            <i class="bi bi-x-circle me-1"></i> Cancel Request
                                        </button>
                                    </form>
                                    <span th:if="${leave.status.name() != 'PENDING'}"
                                        class="text-secondary small fw-semibold">
                                        <i class="bi bi-check2-all me-1"></i> Processed
                                    </span>
                                </td>
                            </tr>
                            <tr th:if="${history.empty}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-calendar-x fs-1 d-block mb-3 opacity-25"></i>
                                    No records found.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${history.totalPages > 1}" aria-label="Page navigation" class="mt-4">
                    <ul class="pagination justify-content-center gap-2 border-0">
                        <li class="page-item" th:classappend="${history.first} ? 'disabled'">
                            <a class="page-link glass-card border-0 py-2 px-3 text-white"
                                th:href="@{/employee/leave/history(page=${history.number - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${history.last} ? 'disabled'">
                            <a class="page-link glass-card border-0 py-2 px-3 text-white"
                                th:href="@{/employee/leave/history(page=${history.number + 1})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments :: scripts}"></th:block>
</body>

</html>
